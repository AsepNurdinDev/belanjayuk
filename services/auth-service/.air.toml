# .air.toml — konfigurasi Air untuk hot reload development
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "tmp/main"
  full_bin = "APP_ENV=development ./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "proto"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "migrations"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  log = "build-errors.log"
  delay = 1000  # ms
  stop_on_error = true
  send_interrupt = false
  kill_delay = "0s"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
