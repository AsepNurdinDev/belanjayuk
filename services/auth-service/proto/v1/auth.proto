syntax = "proto3";

package auth.v1;

option go_package = "github.com/AsepNurdinDev/belanjayuk/services/auth-service/proto/v1;authpb";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string email   = 2;
  string role    = 3;
}